<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    
    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload LCP hero image -->
    <link rel="preload" as="image" href="/Banda_Casamentos_Eventos-2.webp" type="image/webp" fetchpriority="high" />
    
    <!-- Non-render-blocking font loading -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" /></noscript>

    <!-- Google Analytics: deferred until first user interaction -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      (function(){
        var loaded = false;
        function loadGA(){
          if(loaded) return;
          loaded = true;
          var s = document.createElement('script');
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-FQYT8C0DFG';
          s.async = true;
          s.onload = function(){
            gtag('js', new Date());
            gtag('config', 'G-FQYT8C0DFG');
          };
          document.head.appendChild(s);
          ['scroll','click','touchstart','keydown'].forEach(function(e){
            document.removeEventListener(e, loadGA, {capture:true});
          });
        }
        if('requestIdleCallback' in window){
          requestIdleCallback(function(){
            ['scroll','click','touchstart','keydown'].forEach(function(e){
              document.addEventListener(e, loadGA, {capture:true, passive:true, once:true});
            });
            setTimeout(loadGA, 5000);
          });
        } else {
          setTimeout(loadGA, 3000);
        }
      })();
    </script>
    <!-- SEO tags are managed dynamically by react-helmet-async per route -->
    <meta property="og:locale" content="pt_BR" />
    <link rel="icon" type="image/png" href="/banda-barbie-kills-casamento-rock.png" />
  </head>
  <body>
    <div id="root"><!--ssr-outlet--></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
